<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing System - Scanner</title>
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      color: #90caf9;
      margin: 12px 0 24px;
      font-size: 1.6rem;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      color: #90caf9;
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }
    .scan-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      background: #3f51b5;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.scanning {
      background: #f44336;
    }
    #scanner-container {
      margin: 16px 0;
      text-align: center;
    }
    #reader {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border: 2px solid #444;
      border-radius: 10px;
      overflow: hidden;
    }
    #status {
      margin: 12px 0;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      min-height: 24px;
    }
    #status.success { background: #2e7d32; color: white; }
    #status.error   { background: #c62828; color: white; }
    
    .photo-btn {
      background: #455a64;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 1.05rem;
    }
    .submit-btn {
      background: #2e7d32;
      width: 100%;
      padding: 20px;
      font-size: 1.2rem;
      margin-top: 24px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }
    .preview {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 8px;
      display: none;
    }
    .hint {
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <h1>MG Packing System</h1>

  <div class="card">
    <label>Packed By</label>
    <input type="text" id="packedBy" placeholder="Your name / ID">

    <label>Packing Checker By</label>
    <input type="text" id="checkerBy" placeholder="Checker name / ID">
  </div>

  <div class="card">
    <label>Carton ID</label>
    <input type="text" id="cartonId" placeholder="Carton ID">

    <label>Customer Name</label>
    <input type="text" id="customer" placeholder="Customer name">
  </div>

  <div class="card">
    <label>Inner Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="inner" placeholder="Inner barcode" readonly>
      <button id="btn-inner" onclick="startScanner('inner')">SCAN INNER</button>
    </div>

    <label>Outer Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="outer" placeholder="Outer barcode" readonly>
      <button id="btn-outer" onclick="startScanner('outer')">SCAN OUTER</button>
    </div>

    <div id="scanner-container" style="display:none;">
      <div id="reader"></div>
      <button onclick="stopScanner()" style="margin-top:12px; background:#555;">× Close Scanner</button>
    </div>

    <p class="hint">
      Point camera at barcode/QR code.<br>
      Scanning starts when you tap SCAN INNER or SCAN OUTER.
    </p>
  </div>

  <div class="card">
    <button class="photo-btn" onclick="document.getElementById('f1').click()">
      📸 PHOTO: Inner Box / Label
    </button>
    <input type="file" id="f1" accept="image/*" capture="camera" style="display:none" onchange="previewImage(this, 'preview1')">
    <img id="preview1" class="preview" alt="Inner preview">

    <button class="photo-btn" onclick="document.getElementById('f2').click()">
      📸 PHOTO: Carton / Label
    </button>
    <input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="previewImage(this, 'preview2')">
    <img id="preview2" class="preview" alt="Carton preview">
  </div>

  <div class="card">
    <label>Quantity (pcs)</label>
    <input type="number" id="qty" min="1" placeholder="Enter quantity" value="1">
  </div>

  <button class="submit-btn" onclick="submitData()">SUBMIT PACKING DATA</button>

  <div id="status"></div>

  <script>
    let currentScanner = null;
    let activeField = null;
    let images = { inner: "", carton: "" };

    const scannerContainer = document.getElementById('scanner-container');
    const statusDiv = document.getElementById('status');

    function showStatus(msg, type = 'info') {
      statusDiv.textContent = msg;
      statusDiv.className = type;
      statusDiv.style.display = msg ? 'block' : 'none';
    }

    function startScanner(fieldId) {
      if (currentScanner) {
        stopScanner();
      }

      activeField = fieldId;
      scannerContainer.style.display = 'block';
      showStatus("Starting camera... Allow camera access if prompted.");

      const btn = document.getElementById(`btn-${fieldId.split('-')[0] || fieldId}`);
      if (btn) btn.classList.add('scanning');

      currentScanner = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.ITF
        ]
      };

      currentScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          document.getElementById(activeField).value = decodedText.trim();
          showStatus(`Scanned: ${decodedText}`, 'success');
          stopScanner();
        },
        (err) => {
          // silent error during scanning (normal)
        }
      ).catch(err => {
        showStatus("Camera error: " + err, 'error');
        stopScanner();
      });
    }

    function stopScanner() {
      if (currentScanner) {
        currentScanner.stop().catch(()=>{});
        currentScanner.clear();
        currentScanner = null;
      }
      scannerContainer.style.display = 'none';
      const buttons = document.querySelectorAll('.scan-row button');
      buttons.forEach(b => b.classList.remove('scanning'));
      activeField = null;
    }

    function previewImage(input, previewId) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById(previewId);
        img.src = e.target.result;
        img.style.display = 'block';

        // Optional: you can also try to decode barcode from photo here
        // but live scanning is preferred
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function submitData() {
      const btn = document.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = "Saving...";

      const data = {
        packedBy:  document.getElementById('packedBy').value.trim(),
        checkerBy: document.getElementById('checkerBy').value.trim(),
        cartonId:  document.getElementById('cartonId').value.trim(),
        customer:  document.getElementById('customer').value.trim(),
        inner:     document.getElementById('inner').value.trim(),
        outer:     document.getElementById('outer').value.trim(),
        qty:       document.getElementById('qty').value.trim(),
        packedDate: new Date().toISOString().split('T')[0],
        // images.inner and images.carton are base64 — add if you want to send photos
      };

      if (!data.inner || !data.outer) {
        showStatus("Inner and Outer barcodes are required.", 'error');
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
        return;
      }

      // ← Replace this URL with your own Google Apps Script web app URL
      const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID_HERE/exec";

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",           // most reliable for Apps Script
          redirect: "follow",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        // With no-cors we can't read response → assume success if no network error
        showStatus("Data saved successfully!", 'success');
        setTimeout(() => location.reload(), 1800);
      } catch (err) {
        showStatus("Error sending data: " + err.message, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
      }
    }

    // Optional: close scanner when clicking outside
    document.addEventListener('click', e => {
      if (scannerContainer.style.display === 'block' &&
          !scannerContainer.contains(e.target) &&
          !e.target.closest('.scan-row button')) {
        stopScanner();
      }
    });
  </script>

</body>
</html>
