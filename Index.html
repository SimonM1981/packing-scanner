<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            text-align: center;
        }
        h2 {
            color: #90caf9;
            margin: 12px 0 20px;
        }
        .card {
            background: #1e1e1e;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #333;
            text-align: left;
        }
        label {
            display: block;
            margin: 12px 0 4px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #90caf9;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            border: 1px solid #444;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background: #2c2c2c;
            color: white;
        }
        .scan-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-scan {
            background: #3f51b5;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            min-width: 90px;
            font-size: 0.95rem;
        }
        .btn-photo, #submit-btn {
            background: #455a64;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 10px;
            margin: 12px 0 4px;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
        }
        #submit-btn {
            background: #2e7d32;
            padding: 20px;
            font-size: 1.2rem;
            margin-top: 24px;
        }
        #status {
            display: none;
            color: #ffeb3b;
            font-weight: bold;
            margin: 12px 0;
            padding: 10px;
            border: 1px dashed #ffeb3b;
            border-radius: 8px;
            background: rgba(255,235,59,0.1);
        }
        .preview-img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 8px;
            display: none;
            border: 1px solid #444;
        }
        .hint {
            color: #aaa;
            font-size: 0.85rem;
            margin: 4px 0 12px;
            line-height: 1.4;
        }
        .success-flash {
            transition: background-color 0.6s;
        }
    </style>
</head>
<body>

    <h2>MG PACKING SYSTEM</h2>

    <div id="status">Processing...</div>

    <!-- Hidden file input used for all barcode scans -->
    <input type="file" id="barcodeFile" accept="image/*" capture="camera" style="display:none" onchange="decodeBarcode(this)">

    <div class="card">
        <label>Packed By</label>
        <div class="scan-row">
            <input type="text" id="packedBy" placeholder="Your name / ID">
            <button class="btn-scan" onclick="triggerBarcode('packedBy')">SCAN</button>
        </div>

        <label>Packing Checker By</label>
        <div class="scan-row">
            <input type="text" id="checkerBy" placeholder="Checker name / ID">
            <button class="btn-scan" onclick="triggerBarcode('checkerBy')">SCAN</button>
        </div>
    </div>

    <div class="card">
        <label>Carton ID</label>
        <input type="text" id="cartonId" placeholder="Enter or scan Carton ID">

        <label>Customer Name</label>
        <div class="scan-row">
            <input type="text" id="customer" placeholder="Customer name">
            <button class="btn-scan" onclick="triggerBarcode('customer')">SCAN</button>
        </div>
    </div>

    <div class="card">
        <label>Inner Barcode / QR</label>
        <div class="scan-row">
            <input type="text" id="inner" placeholder="Scan inner barcode">
            <button class="btn-scan" onclick="triggerBarcode('inner')">SCAN INNER</button>
        </div>

        <label>Outer Barcode / QR</label>
        <div class="scan-row">
            <input type="text" id="outer" placeholder="Scan outer barcode">
            <button class="btn-scan" onclick="triggerBarcode('outer')">SCAN OUTER</button>
        </div>

        <p class="hint">
            Tap SCAN → choose Camera → point at barcode/QR → take photo.<br>
            The code will be read automatically.
        </p>
    </div>

    <div class="card">
        <button class="btn-photo" onclick="document.getElementById('f1').click()">
            📸 PHOTO: INNER BOX / LABEL
        </button>
        <input type="file" id="f1" accept="image/*" capture="camera" style="display:none" onchange="processImage(this, 'p1', 'imgInner')">
        <img id="p1" class="preview-img" alt="Inner box preview">

        <button class="btn-photo" onclick="document.getElementById('f2').click()">
            📸 PHOTO: CARTON / LABEL
        </button>
        <input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="processImage(this, 'pc', 'imgCarton')">
        <img id="pc" class="preview-img" alt="Carton preview">
    </div>

    <input type="number" id="qty" placeholder="Enter Quantity (pcs)" min="1">

    <button id="submit-btn" onclick="submitForm()">SUBMIT PACKING DATA</button>

<script>
    let activeInputId = "";
    let images = { imgInner: "", imgCarton: "" };
    const html5QrCode = new Html5Qrcode("status");

    function triggerBarcode(id) {
        activeInputId = id;
        document.getElementById('barcodeFile').click();
    }

    function decodeBarcode(input) {
        if (!input.files || input.files.length === 0) return;

        const status = document.getElementById('status');
        status.style.display = 'block';
        status.innerText = "Reading barcode / QR...";
        status.style.color = "#ffeb3b";

        const file = input.files[0];
        html5QrCode.scanFile(file, true)
            .then(decodedText => {
                const inputEl = document.getElementById(activeInputId);
                inputEl.value = decodedText.trim();

                status.innerText = "✓ Scanned: " + decodedText;
                status.style.color = "#4caf50";

                // Flash green
                inputEl.classList.add('success-flash');
                inputEl.style.backgroundColor = "#2e7d32";
                setTimeout(() => {
                    inputEl.style.backgroundColor = "#2c2c2c";
                    inputEl.classList.remove('success-flash');
                }, 700);

                setTimeout(() => { status.style.display = 'none'; }, 2200);
            })
            .catch(err => {
                status.innerText = "Could not read code. Try clearer photo.";
                status.style.color = "#ef5350";
                setTimeout(() => { status.style.display = 'none'; }, 3000);
            })
            .finally(() => {
                input.value = ""; // Reset file input
            });
    }

    function processImage(input, previewId, dataKey) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 900;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                canvas.getContext("2d").drawImage(img, 0, 0, width, height);

                const dataUrl = canvas.toDataURL("image/jpeg", 0.78);
                images[dataKey] = dataUrl;

                const preview = document.getElementById(previewId);
                preview.src = dataUrl;
                preview.style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function submitForm() {
        const btn = document.getElementById('submit-btn');
        const innerVal = document.getElementById('inner').value.trim();
        const outerVal = document.getElementById('outer').value.trim();
        const qtyVal  = document.getElementById('qty').value.trim();

        if (!innerVal || !outerVal) {
            alert("Inner and Outer barcodes are required.");
            return;
        }
        if (!qtyVal || isNaN(qtyVal) || Number(qtyVal) < 1) {
            alert("Please enter a valid quantity (at least 1).");
            return;
        }

        btn.disabled = true;
        btn.innerText = "SAVING...";

        const data = {
            packedBy:  document.getElementById('packedBy').value.trim(),
            checkerBy: document.getElementById('checkerBy').value.trim(),
            cartonId:  document.getElementById('cartonId').value.trim(),
            customer:  document.getElementById('customer').value.trim(),
            inner:     innerVal,
            outer:     outerVal,
            qty:       qtyVal,
            packedDate: new Date().toISOString().split('T')[0],
            imgInner:  images.imgInner  || "",
            imgCarton: images.imgCarton || ""
        };

        google.script.run
            .withSuccessHandler((res) => {
                alert(res);
                location.reload();
            })
            .withFailureHandler((err) => {
                alert("Error: " + (err.message || "Submission failed"));
                btn.disabled = false;
                btn.innerText = "SUBMIT PACKING DATA";
            })
            .submitToSheet(data);
    }
</script>
</body>
</html>
