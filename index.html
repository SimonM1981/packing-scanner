<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing System - Scanner</title>
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      color: #90caf9;
      margin: 12px 0 24px;
      font-size: 1.6rem;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
      color: #90caf9;
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }
    .scan-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      background: #3f51b5;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.scanning {
      background: #f44336;
    }
    button.fallback {
      background: #555;
      font-size: 0.85rem;
      padding: 8px 12px;
    }
    #scanner-container {
      margin: 16px 0;
      text-align: center;
    }
    #reader {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border: 2px solid #444;
      border-radius: 10px;
      overflow: hidden;
    }
    #status {
      margin: 16px 0;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      min-height: 48px;
      line-height: 1.4;
    }
    #status.success { background: #2e7d32; color: white; }
    #status.error   { background: #c62828; color: white; }
    #status.warning { background: #f57c00; color: white; }
    
    .photo-btn {
      background: #455a64;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      font-size: 1.05rem;
    }
    .submit-btn {
      background: #2e7d32;
      width: 100%;
      padding: 20px;
      font-size: 1.2rem;
      margin-top: 24px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }
    .preview {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      border-radius: 10px;
      margin-top: 8px;
      display: none;
    }
    .hint, .perm-hint {
      color: #aaa;
      font-size: 0.85rem;
      margin-top: 4px;
      line-height: 1.4;
    }
    .perm-hint {
      color: #ffeb3b;
      font-weight: bold;
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <h1>MG Packing System</h1>

  <div class="card">
    <label>Packed By</label>
    <input type="text" id="packedBy" placeholder="Your name / ID">

    <label>Packing Checker By</label>
    <input type="text" id="checkerBy" placeholder="Checker name / ID">
  </div>

  <div class="card">
    <label>Carton ID</label>
    <input type="text" id="cartonId" placeholder="Carton ID">

    <label>Customer Name</label>
    <input type="text" id="customer" placeholder="Customer name">
  </div>

  <div class="card">
    <label>Inner Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="inner" placeholder="Inner barcode" readonly style="flex:1;">
      <button id="btn-inner" onclick="startScanner('inner')">SCAN LIVE</button>
      <button class="fallback" onclick="triggerFileScan('inner')">Take Photo</button>
    </div>

    <label>Outer Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="outer" placeholder="Outer barcode" readonly style="flex:1;">
      <button id="btn-outer" onclick="startScanner('outer')">SCAN LIVE</button>
      <button class="fallback" onclick="triggerFileScan('outer')">Take Photo</button>
    </div>

    <div id="scanner-container" style="display:none;">
      <div id="reader"></div>
      <button onclick="stopScanner()" style="margin-top:12px; background:#555; width:100%;">× Close Scanner</button>
    </div>

    <p class="hint">
      Preferred: Use "SCAN LIVE" – point camera at barcode/QR code.
    </p>
    <p class="perm-hint">
      First time? Browser will ask to allow camera → tap <strong>Allow</strong>.<br>
      No popup? → Check browser settings → Camera → Allow for this site → reload page.
    </p>
  </div>

  <!-- Hidden file input for fallback photo scanning -->
  <input type="file" id="barcodeFile" accept="image/*" capture="camera" style="display:none" onchange="decodeFromFile(this)">

  <div class="card">
    <button class="photo-btn" onclick="document.getElementById('f1').click()">
      📸 PHOTO: Inner Box / Label
    </button>
    <input type="file" id="f1" accept="image/*" capture="camera" style="display:none" onchange="previewImage(this, 'preview1')">
    <img id="preview1" class="preview" alt="Inner preview">

    <button class="photo-btn" onclick="document.getElementById('f2').click()">
      📸 PHOTO: Carton / Label
    </button>
    <input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="previewImage(this, 'preview2')">
    <img id="preview2" class="preview" alt="Carton preview">
  </div>

  <div class="card">
    <label>Quantity (pcs)</label>
    <input type="number" id="qty" min="1" placeholder="Enter quantity" value="1">
  </div>

  <button class="submit-btn" onclick="submitData()">SUBMIT PACKING DATA</button>

  <div id="status"></div>

  <script>
    let currentScanner = null;
    let activeField = null;
    let images = { inner: "", carton: "" };

    const scannerContainer = document.getElementById('scanner-container');
    const statusDiv = document.getElementById('status');

    function showStatus(msg, type = 'info') {
      statusDiv.textContent = msg;
      statusDiv.className = type;
      statusDiv.style.display = msg ? 'block' : 'none';
      if (type !== 'info') {
        setTimeout(() => { statusDiv.style.display = 'none'; }, 8000);
      }
    }

    function startScanner(fieldId) {
      if (currentScanner) stopScanner();

      activeField = fieldId;
      scannerContainer.style.display = 'block';
      showStatus("Attempting to open camera... Please allow permission", 'warning');

      const btn = document.getElementById(`btn-${fieldId}`);
      if (btn) btn.classList.add('scanning');

      // Small delay helps some mobile browsers initialize properly
      setTimeout(() => {
        currentScanner = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 1.0,
          rememberLastUsedCamera: true,
          supportedScanTypes: [Html5QrcodeSupportedScanType.CAMERA]
        };

        currentScanner.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            document.getElementById(activeField).value = decodedText.trim();
            showStatus(`Scanned: ${decodedText}`, 'success');
            stopScanner();
          },
          (err) => { /* silent */ }
        ).catch(err => {
          console.error("Camera start failed:", err.name, err.message, err);
          let msg = "Camera could not start: " + (err.message || err);
          if (err.name === "NotAllowedError") {
            msg = "Camera permission denied. Go to browser settings → Camera → Allow this site → reload.";
          } else if (err.name === "NotFoundError" || err.name === "NoCamerasError") {
            msg = "No camera detected on this device.";
          } else if (err.name === "NotReadableError") {
            msg = "Camera in use by another app. Close other apps and try again.";
          }
          showStatus(msg, 'error');
          stopScanner();
        });
      }, 300);
    }

    function stopScanner() {
      if (currentScanner) {
        currentScanner.stop().catch(() => {});
        currentScanner.clear();
        currentScanner = null;
      }
      scannerContainer.style.display = 'none';
      document.querySelectorAll('.scan-row button').forEach(b => b.classList.remove('scanning'));
      activeField = null;
    }

    // Fallback: Take photo and decode
    function triggerFileScan(fieldId) {
      activeField = fieldId;
      document.getElementById('barcodeFile').click();
    }

    function decodeFromFile(input) {
      if (!input.files?.length) return;

      showStatus("Decoding photo...", 'warning');

      const file = input.files[0];
      const scanner = new Html5Qrcode("status-div-hidden"); // dummy element

      scanner.scanFile(file, true)
        .then(decodedText => {
          document.getElementById(activeField).value = decodedText.trim();
          showStatus(`Decoded from photo: ${decodedText}`, 'success');
        })
        .catch(err => {
          console.error("File decode failed:", err);
          showStatus("Could not read barcode from photo. Try clearer image.", 'error');
        })
        .finally(() => {
          input.value = "";
        });
    }

    function previewImage(input, previewId) {
      if (!input.files?.[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById(previewId).src = e.target.result;
        document.getElementById(previewId).style.display = 'block';
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function submitData() {
      const btn = document.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = "Saving...";

      const data = {
        packedBy:  document.getElementById('packedBy').value.trim(),
        checkerBy: document.getElementById('checkerBy').value.trim(),
        cartonId:  document.getElementById('cartonId').value.trim(),
        customer:  document.getElementById('customer').value.trim(),
        inner:     document.getElementById('inner').value.trim(),
        outer:     document.getElementById('outer').value.trim(),
        qty:       document.getElementById('qty').value.trim(),
        packedDate: new Date().toISOString().split('T')[0]
      };

      if (!data.inner || !data.outer) {
        showStatus("Inner and Outer barcodes are required.", 'error');
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
        return;
      }

      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZUjFJDh3r7XyK977Iwnj4rt8a4QMexxICmXn0W9Nj7bMt150DigfHvgHEwxYW70Hg/exec";

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          redirect: "follow",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        showStatus("Data saved successfully!", 'success');
        setTimeout(() => location.reload(), 2200);
      } catch (err) {
        showStatus("Network error: " + err.message, 'error');
        console.error("Submit failed:", err);
      } finally {
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
      }
    }

    // Close scanner when clicking outside
    document.addEventListener('click', e => {
      if (scannerContainer.style.display === 'block' &&
          !scannerContainer.contains(e.target) &&
          !e.target.closest('.scan-row button')) {
        stopScanner();
      }
    });
  </script>

</body>
</html>
