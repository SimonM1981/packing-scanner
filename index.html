<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>MG Packing System - Scanner</title>
  
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 16px; min-height: 100vh; }
    h1 { text-align: center; color: #90caf9; margin: 12px 0 24px; font-size: 1.6rem; }
    .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; color: #90caf9; font-size: 0.95rem; }
    input[type="text"], input[type="number"] { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
    .scan-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button { background: #3f51b5; color: white; border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem; }
    button.scanning { background: #f44336; }
    #scanner-container { margin: 16px 0; text-align: center; }
    #reader { width: 100%; max-width: 480px; margin: 0 auto; border: 2px solid #444; border-radius: 10px; overflow: hidden; background: #000; }
    #status { margin: 12px 0; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; min-height: 24px; }
    #status.success { background: #2e7d32; color: white; }
    #status.error   { background: #c62828; color: white; }
    .photo-btn { background: #455a64; width: 100%; padding: 16px; margin: 12px 0; font-size: 1.05rem; }
    .submit-btn { background: #2e7d32; width: 100%; padding: 20px; font-size: 1.2rem; margin-top: 24px; border: none; border-radius: 10px; color: white; font-weight: bold; }
    .preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-top: 8px; display: none; border: 1px solid #555; }
    .hint { color: #aaa; font-size: 0.85rem; margin-top: 4px; line-height: 1.4; }
    .perm-hint { color: #ffeb3b; font-weight: bold; margin: 12px 0; }
  </style>
</head>
<body>

  <h1>MG Packing System</h1>

  <div class="card">
    <label>Packed By</label>
    <div class="scan-row">
      <input type="text" id="packedBy" placeholder="Your name / ID" style="flex:1;">
      <button onclick="startScanner('packedBy')">SCAN</button>
    </div>

    <label>Packing Checker By</label>
    <div class="scan-row">
      <input type="text" id="checkerBy" placeholder="Checker name / ID" style="flex:1;">
      <button onclick="startScanner('checkerBy')">SCAN</button>
    </div>
  </div>

  <div class="card">
    <label>Carton ID</label>
    <input type="text" id="cartonId" placeholder="Carton ID">

    <label>Customer Name</label>
    <div class="scan-row">
      <input type="text" id="customer" placeholder="Customer name" style="flex:1;">
      <button onclick="startScanner('customer')">SCAN</button>
    </div>

    <label>P/I No.</label>
    <div class="scan-row">
      <input type="text" id="pi" placeholder="P/I number" style="flex:1;">
      <button onclick="startScanner('pi')">SCAN</button>
    </div>
  </div>

  <div class="card">
    <label>Inner Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="inner" placeholder="Inner barcode" readonly style="flex:1;">
      <button id="btn-inner" onclick="startScanner('inner')">SCAN LIVE</button>
    </div>

    <label>Outer Barcode / QR</label>
    <div class="scan-row">
      <input type="text" id="outer" placeholder="Outer barcode" readonly style="flex:1;">
      <button id="btn-outer" onclick="startScanner('outer')">SCAN LIVE</button>
    </div>

    <div id="scanner-container" style="display:none;">
      <div id="reader"></div>
      <button onclick="stopScanner()" style="margin-top:12px; background:#555; width:100%;">× Close Scanner</button>
    </div>

    <p class="hint">Point camera at barcode/QR code. Works for both 1D barcodes and QR codes.</p>
    <p class="perm-hint">First time? Allow camera when prompted.<br>No popup? Reset permission in browser settings → reload in private tab.</p>
  </div>

  <div class="card">
    <button class="photo-btn" onclick="document.getElementById('f1').click()">📸 PHOTO: Inner Box / Label</button>
    <input type="file" id="f1" accept="image/*" capture="camera" style="display:none" onchange="processPhoto(this, 'preview1', 'imgInner')">
    <img id="preview1" class="preview" alt="Inner preview">

    <button class="photo-btn" onclick="document.getElementById('f2').click()">📸 PHOTO: Carton / Label</button>
    <input type="file" id="f2" accept="image/*" capture="camera" style="display:none" onchange="processPhoto(this, 'preview2', 'imgCarton')">
    <img id="preview2" class="preview" alt="Carton preview">
  </div>

  <div class="card">
    <label>Quantity (pcs)</label>
    <input type="number" id="qty" min="1" placeholder="Enter quantity" value="1">
  </div>

  <button class="submit-btn" onclick="submitData()">SUBMIT PACKING DATA</button>

  <div id="status"></div>

  <script>
    let html5QrCode = null;
    let activeField = null;
    let images = { imgInner: "", imgCarton: "" };

    const scannerContainer = document.getElementById('scanner-container');
    const statusDiv = document.getElementById('status');

    function showStatus(msg, type = 'info') {
      statusDiv.textContent = msg;
      statusDiv.className = type;
      statusDiv.style.display = 'block';
      if (type !== 'info') setTimeout(() => statusDiv.style.display = 'none', 8000);
    }

    async function startScanner(fieldId) {
      activeField = fieldId;
      scannerContainer.style.display = 'block';
      showStatus("Starting camera... Allow if prompted", 'warning');

      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

      try {
        if (html5QrCode.isScanning) await html5QrCode.stop();

        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 20, qrbox: 250 },
          (decodedText) => {
            document.getElementById(activeField).value = decodedText.trim();
            showStatus(`Scanned: ${decodedText}`, 'success');
            stopScanner();
          }
        );
      } catch (err) {
        console.error("Scanner error:", err);
        showStatus("Camera error: " + (err.message || "Check permission"), 'error');
        stopScanner();
      }
    }

    function stopScanner() {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().catch(() => {});
      }
      scannerContainer.style.display = 'none';
      activeField = null;
    }

    function processPhoto(input, previewId, dataKey) {
      if (!input.files?.[0]) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        images[dataKey] = base64;

        const img = document.getElementById(previewId);
        img.src = base64;
        img.style.display = 'block';

        showStatus("Photo ready", 'success');
      };
      reader.readAsDataURL(input.files[0]);
    }

    async function submitData() {
      const btn = document.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = "Saving...";

      const data = {
        packedBy: document.getElementById('packedBy').value.trim(),
        checkerBy: document.getElementById('checkerBy').value.trim(),
        cartonId: document.getElementById('cartonId').value.trim(),
        customer: document.getElementById('customer').value.trim(),
        pi: document.getElementById('pi').value.trim(),           // ← new
        inner: document.getElementById('inner').value.trim(),
        outer: document.getElementById('outer').value.trim(),
        qty: document.getElementById('qty').value.trim(),
        packedDate: new Date().toISOString().split('T')[0],
        imgInner: images.imgInner || "",
        imgCarton: images.imgCarton || ""
      };

      if (!data.inner || !data.outer) {
        showStatus("Inner and Outer barcodes required.", 'error');
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
        return;
      }

      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwZUjFJDh3r7XyK977Iwnj4rt8a4QMexxICmXn0W9Nj7bMt150DigfHvgHEwxYW70Hg/exec";

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          redirect: "follow",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        showStatus("Data & photos saved!", 'success');
        setTimeout(() => location.reload(), 2500);
      } catch (err) {
        showStatus("Error: " + err.message, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "SUBMIT PACKING DATA";
      }
    }
  </script>
</body>
</html>
